name: Daily fundamentals refresh

on:
  schedule:
    # 15:45 UTC = 21:15 IST, weekdays — after companies broadcast quarterly results
    # (filings land through the evening). Self-heals: the updater scans a 21-day
    # window each run, so a skipped day is caught up by the next.
    - cron: "45 15 * * 1-5"
  # Optional external trigger (cron-job.org) — SEPARATE event type from the
  # stock/MF/FII/backtest-data jobs. POST /repos/dhruvan246/stocks-dashboard/dispatches
  # with {"event_type":"fundamentals-refresh"}
  repository_dispatch:
    types: [fundamentals-refresh]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-fundamentals
  cancel-in-progress: false

jobs:
  refresh-fundamentals:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pull newly-filed quarterly results into sf_fundamentals.json
        run: python3 scripts/update_fundamentals.py

      # Backstop: any quarter that lands without a filing date (Screener backfills, integrated
      # rows with broadcast_Date=None) gets the SEBI deadline so the point-in-time screen can use
      # it (a null date silently drops the quarter -> stale fallback, which wrongly excluded AIIL).
      - name: Fill any null announcement dates (point-in-time safety)
        run: python3 scripts/fill_ann_dates.py

      - name: Commit updated fundamentals (only if new earnings landed)
        run: |
          if [ ! -f docs/.fund_updated ]; then
            echo "No new earnings — nothing to commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp docs/sf_fundamentals.json /tmp/sf_fundamentals.json
          for attempt in 1 2 3 4 5; do
            git fetch origin main && git reset --hard origin/main
            cp /tmp/sf_fundamentals.json docs/sf_fundamentals.json
            git add docs/sf_fundamentals.json
            if git diff --cached --quiet; then echo "no diff"; exit 0; fi
            git commit -m "Daily fundamentals refresh $(TZ=Asia/Kolkata date +'%Y-%m-%d %H:%M IST')"
            if git push origin HEAD:main; then echo "pushed (attempt #$attempt)"; exit 0; fi
            sleep $(( attempt * 3 ))
          done
          echo "push failed after 5 attempts"; exit 1
