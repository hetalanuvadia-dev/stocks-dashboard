name: Daily mutual fund refresh

on:
  schedule:
    # Fallback only (GitHub cron is best-effort). 16:30 UTC = 22:00 IST, on
    # weekdays. The reliable primary trigger is the cron-job.org job below.
    - cron: "30 16 * * 1-5"
  # External scheduler (cron-job.org) hits
  #   POST /repos/dhruvan246/stocks-dashboard/dispatches
  # with header `Authorization: Bearer <PAT>` and body
  #   {"event_type":"mf-refresh"}
  # This is a SEPARATE event type from the stock dashboard's "scheduled-refresh"
  # so the two dashboards refresh independently on their own schedules.
  repository_dispatch:
    types: [mf-refresh]
  workflow_dispatch: {}

permissions:
  contents: write

# Independent of the stock refresh; runs one at a time.
concurrency:
  group: refresh-mf
  cancel-in-progress: false

jobs:
  refresh-mf:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh mutual fund prices & returns
        run: python3 scripts/fetch_mf_returns.py

      - name: Build mutual funds dashboard
        run: python3 scripts/build_mutualfunds.py

      - name: Commit updated mutual fund dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Reset-and-replay strategy on push conflicts: pull latest main, drop
          # our freshly built files on top (overwrite, no merge), commit, push.
          mkdir -p /tmp/mf/docs /tmp/mf/scripts
          cp docs/mutual-funds.html    /tmp/mf/docs/
          cp scripts/mutual_funds.json /tmp/mf/scripts/

          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/mf/docs/mutual-funds.html    docs/mutual-funds.html
            cp /tmp/mf/scripts/mutual_funds.json scripts/mutual_funds.json
            git add docs/mutual-funds.html scripts/mutual_funds.json

            if git diff --cached --quiet; then
              echo "Remote already has identical mutual fund data — nothing to commit"
              exit 0
            fi

            git commit -m "Daily MF refresh $(TZ=Asia/Kolkata date +'%Y-%m-%d %H:%M IST')"
            if git push origin HEAD:main; then
              echo "Pushed on attempt #$attempt"
              exit 0
            fi
            echo "Push attempt #$attempt rejected; resetting and retrying"
            sleep $(( attempt * 3 ))
          done
          echo "Failed to push after 5 attempts"
          exit 1
